controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 20  # Hz

    rover_base_control:
      type: diff_drive_controller/DiffDriveController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    scara_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: joint_trajectory_controller/JointTrajectoryController


rover_base_control:
  ros__parameters:
    type: diff_drive_controller/DiffDriveController
    use_stamped_vel: false
    use_sim_time: true
    publish_rate: 50.0

    left_wheel_names: ["Front_Left_Tire_link_joint", "Back_Left_Tire1_link_joint", "Back_Left_Tire2_link_joint"]

    right_wheel_names: ["Front_Right_Tire_link_joint","Back_Right_Tire1_link_joint","Back_Right_Tire2_link_joint"]

    wheel_separation: 2.20
    wheel_radius: 0.30

    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier: 1.0
    right_wheel_radius_multiplier: -1.0

    base_frame_id: base_footprint
    enable_odom_tf: true
    publish_limited_velocity: true

    linear:
      x:
        has_velocity_limits: true
        max_velocity: 3.0
        has_acceleration_limits: true
        max_acceleration: 3.0

    angular:
      z:
        has_velocity_limits: true
        max_velocity: 3.0
        has_acceleration_limits: true
        max_acceleration: 3.0

/scara_controller:
  ros__parameters:
    joints:
      - Arm2_link_joint
      - Arm3_link_joint
      - Arm4_link_joint
      - Extensor_link_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
      - effort
    allow_nonzero_velocity_at_trajectory_end: true


/gripper_controller:
  ros__parameters:
    joints:
      - Garra_Left_link_joint
      - Garra_Right_link_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
      - effort
    allow_nonzero_velocity_at_trajectory_end: true